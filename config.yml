# OpenShard configuration
# Model tiers are evaluated top-to-bottom; the first matching tier is used.
#
# API key: export OPENROUTER_API_KEY=<your_key>
# Obtain one from https://openrouter.ai/keys

model_tiers:
  - name: fast
    model: anthropic/claude-haiku-4.5
    max_tokens: 1024

  - name: balanced
    model: anthropic/claude-sonnet-4.6
    max_tokens: 4096

  - name: powerful
    model: anthropic/claude-opus-4.6
    max_tokens: 8192

planning_model: anthropic/claude-sonnet-4.6
execution_model: anthropic/claude-sonnet-4.6
fixer_model: anthropic/claude-sonnet-4.6

# Workflow shape: auto (default) | direct | staged | opencode
# auto   — policy-driven: routes task to the best shape automatically
# direct — single-pass API call, no planning stage
# staged — planning stage then implementation stage
# opencode — delegate to OpenCode CLI subprocess
workflow: auto

# Approval mode: smart (default) | auto | ask
# Controls when OpenShard prompts before writing, running shell commands, etc.
# smart — prompts for security/complex tasks and risky paths
# auto  — never prompts (gates are silent)
# ask   — prompts before every task
approval_mode: smart
cost_gate_threshold: 0.10

# DEPRECATED: use `workflow` instead. Kept for backward compatibility.
executor: direct

# Optional: override auto-detected verification command.
# If set, this is used instead of npm test / pytest detection.
# verification_command:
#   - python
#   - -m
#   - pytest
