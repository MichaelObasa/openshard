# OpenShard configuration
# Model tiers are evaluated top-to-bottom; the first matching tier is used.
#
# API key: export OPENROUTER_API_KEY=<your_key>
# Obtain one from https://openrouter.ai/keys

model_tiers:
  - name: fast
    model: anthropic/claude-haiku-4.5
    max_tokens: 1024

  - name: balanced
    model: anthropic/claude-sonnet-4.6
    max_tokens: 4096

  - name: powerful
    model: anthropic/claude-opus-4.6
    max_tokens: 8192

planning_model: anthropic/claude-sonnet-4.6
execution_model: anthropic/claude-sonnet-4.6
fixer_model: anthropic/claude-sonnet-4.6

# Execution mode: auto | ask | smart (default)
# auto  — always proceed without asking
# ask   — always prompt before writing
# smart — prompt only for higher-risk tasks (auth, payments, secrets, etc.)
mode: smart

# Optional: override auto-detected verification command.
# If set, this is used instead of npm test / pytest detection.
# verification_command:
#   - python
#   - -m
#   - pytest
